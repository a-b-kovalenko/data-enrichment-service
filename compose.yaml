name: data-enrichment-service

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: enrichment
      POSTGRES_USER: enrichment
      POSTGRES_PASSWORD: enrichment
    ports:
      - "5432:5432"
    volumes:
      - ${PROJECT_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enrichment -d enrichment"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: enrichment
      RABBITMQ_DEFAULT_PASS: enrichment
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ${PROJECT_DATA_DIR}/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
