spring:
  application:
    name: data-enrichment-service
  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: true
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true

enrichment:
  event-time-zone: UTC
  client:
    base-url: ${ENRICHMENT_CLIENT_BASE_URL:http://localhost:8081}
    connect-timeout: ${ENRICHMENT_CLIENT_CONNECT_TIMEOUT:PT1S}
    read-timeout: ${ENRICHMENT_CLIENT_READ_TIMEOUT:PT2S}
    circuit-breaker:
      sliding-window-size: ${ENRICHMENT_CLIENT_CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE:4}
      minimum-number-of-calls: ${ENRICHMENT_CLIENT_CIRCUIT_BREAKER_MINIMUM_NUMBER_OF_CALLS:2}
      failure-rate-threshold: ${ENRICHMENT_CLIENT_CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD:50}
      wait-duration-in-open-state: ${ENRICHMENT_CLIENT_CIRCUIT_BREAKER_WAIT_DURATION_IN_OPEN_STATE:PT5S}
      permitted-number-of-calls-in-half-open-state: ${ENRICHMENT_CLIENT_CIRCUIT_BREAKER_PERMITTED_CALLS_IN_HALF_OPEN:1}
  messaging:
    input-exchange: ${ENRICHMENT_INPUT_EXCHANGE:enrichment.input}
    input-queue: ${ENRICHMENT_INPUT_QUEUE:enrichment.input.queue}
    input-routing-key: ${ENRICHMENT_INPUT_ROUTING_KEY:enrichment.input}
    retry-exchange: ${ENRICHMENT_RETRY_EXCHANGE:enrichment.retry}
    retry-queue: ${ENRICHMENT_RETRY_QUEUE:enrichment.retry.queue}
    retry-routing-key: ${ENRICHMENT_RETRY_ROUTING_KEY:enrichment.retry}
    dead-letter-exchange: ${ENRICHMENT_DLX:enrichment.dlx}
    dead-letter-queue: ${ENRICHMENT_DLQ:enrichment.dlq}
    dead-letter-routing-key: ${ENRICHMENT_DLQ_ROUTING_KEY:enrichment.dlq}
    retry-delay-milliseconds: ${ENRICHMENT_RETRY_DELAY_MILLISECONDS:5000}
    max-retry-attempts: ${ENRICHMENT_MAX_RETRY_ATTEMPTS:3}
  outbox:
    publisher-enabled: ${ENRICHMENT_OUTBOX_PUBLISHER_ENABLED:true}
    output-exchange: ${ENRICHMENT_OUTPUT_EXCHANGE:enrichment.output}
    output-routing-key: ${ENRICHMENT_OUTPUT_ROUTING_KEY:enrichment.output}
    batch-size: ${ENRICHMENT_OUTBOX_BATCH_SIZE:20}
    publish-delay: ${ENRICHMENT_OUTBOX_PUBLISH_DELAY:PT1S}
    confirm-timeout: ${ENRICHMENT_OUTBOX_CONFIRM_TIMEOUT:PT5S}
    claim-duration: ${ENRICHMENT_OUTBOX_CLAIM_DURATION:PT30S}
    initial-backoff: ${ENRICHMENT_OUTBOX_INITIAL_BACKOFF:PT5S}
    max-backoff: ${ENRICHMENT_OUTBOX_MAX_BACKOFF:PT5M}
    max-attempts: ${ENRICHMENT_OUTBOX_MAX_ATTEMPTS:10}
